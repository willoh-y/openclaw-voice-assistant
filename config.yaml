audio:
  sample_rate: 16000
  channels: 1
  mic_device: "alsa_input.usb-Fractal_Fractal_Scape_Dongle_00000000911AD4AV2847-00.mono-fallback"
  gate_threshold: 200

stt:
  provider: "whisper"  # or "deepgram"
  model: "nova-3"
  language: "en"
  endpointing_ms: 1500
  max_session_seconds: 300
  listening_timeout_seconds: 10.0
  whisper:
    url: "http://127.0.0.1:8178"
    inference_path: "/inference"
    response_format: "text"
    temperature: 0.0
    temperature_inc: 0.2
    request_timeout_seconds: 120
  vad:
    aggressiveness: 2
    frame_ms: 30
    pre_speech_ms: 300
    min_speech_ms: 200

tts:
  provider: "elevenlabs"  # or "edge"
  elevenlabs:
    voice_id: "DWE9K7cSWwOb3HxtnOdw"
    model: "eleven_flash_v2_5"
    stability: 0.5
    similarity_boost: 1.0
  edge:
    voice: "en-US-ChristopherNeural"

llm:
  url: "http://127.0.0.1:18789"
  session_id: "agent:main:main"
  timeout_seconds: 120

interrupt:
  delay_seconds: 0.5
  sustained_threshold_seconds: 0.3

dictation:
  chunk_silence_ms: 700  # Pause duration to trigger chunk transcription
  min_audio_rms: 400     # Filter quiet background noise
  auto_spacing: true     # Smart spacing between chunks (punctuation-aware)
